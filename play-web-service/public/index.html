<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta
    name="description"
    content="NFC卡片助手微信小程序宣传页，展示 NFC 写卡体验与扫码入口。"
  >
  <meta name="theme-color" content="#F3ECD8">
  <title>NFC卡片助手 | NFC 写卡海报</title>
  <link rel="stylesheet" href="./home.css">
</head>
<body>
  <main class="hero-page">
    <section class="hero" id="top" aria-label="NFC卡片助手官网首页">
      <div class="hero__layout">
        <div class="hero__copy">
          <div class="hero__brand-mark" aria-hidden="true"></div>
          <p class="eyebrow">LOCAL MEDIA TO NFC</p>
          <h1 class="hero__title">
            <span class="hero__title-line">把本地音频</span>
            <span class="hero__title-line hero__title-line--accent">写进 NFC 卡片</span>
          </h1>
        </div>

        <div class="hero__visual hero__visual--desktop">
          <div class="hero__halo" aria-hidden="true"></div>

          <figure class="device-frame">
            <div class="device-frame__screen-wrap">
              <img
                src="./assets/miniprogram-home.png"
                alt="NFC卡片助手小程序首页截图"
                class="device-frame__screen"
              >
            </div>
          </figure>

          <aside class="hero__qr-card" aria-label="NFC卡片助手微信小程序二维码">
            <p class="hero__qr-label">扫码体验</p>
            <div class="hero__qr-frame">
              <img
                src="./assets/miniprogram-qrcode.jpg"
                alt="NFC卡片助手微信小程序二维码"
                class="hero__qr-image"
              >
            </div>
          </aside>
        </div>

        <div class="hero__visual hero__visual--mobile">
          <div class="hero__mobile-stage">
            <div class="hero__halo hero__halo--mobile" aria-hidden="true"></div>

            <figure class="device-frame device-frame--mobile">
              <div class="device-frame__screen-wrap">
                <img
                  src="./assets/miniprogram-home.png"
                  alt="NFC卡片助手小程序首页截图"
                  class="device-frame__screen"
                >
              </div>
            </figure>
          </div>

          <aside class="hero__qr-card hero__qr-card--mobile" aria-label="NFC卡片助手微信小程序二维码">
            <p class="hero__qr-label">扫码体验</p>
            <div class="hero__qr-frame">
              <img
                src="./assets/miniprogram-qrcode.jpg"
                alt="NFC卡片助手微信小程序二维码"
                class="hero__qr-image"
              >
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
